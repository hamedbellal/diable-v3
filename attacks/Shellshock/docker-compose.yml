version: '3.8'

services:
  shellshock-lab:
    build: .
    image: diable/shellshock-lab:latest
    container_name: shellshock-lab
    ports:
      - "8086:80"
    environment:
      - DEBUG_MODE=false
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "diable.lab=cve-2014-6287"
      - "diable.difficulty=medium"
      - "diable.tag=RCE"
    networks:
      - diable-network

networks:
  diable-network:
    external: true
