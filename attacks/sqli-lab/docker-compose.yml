Set-Content -Path docker-compose.yml -Value 'version: "3.8"

services:
  sqli-comments-lab:
    build: .
    image: diable/sqli-comments-lab:latest
    container_name: sqli-comments-lab
    ports:
      - "8080:80"
    environment:
      - DEBUG_MODE=false
      - DB_PATH=/var/www/html/database.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "diable.lab=sqli-comments"
      - "diable.difficulty=medium"
      - "diable.tag=DB"