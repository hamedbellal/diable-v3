version: '3.8'

services:
  xpath-injection-lab:
    build: .
    image: diable/xpath-injection-lab:latest
    container_name: xpath-injection-lab
    ports:
      - "8081:80"
    environment:
      - DEBUG_MODE=false
      - DATA_PATH=/var/www/html/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "diable.lab=xpath-injection"
      - "diable.difficulty=medium"
      - "diable.tag=XML"
    networks:
      - diable-network

networks:
  diable-network:
    name: diable-network
    driver: bridge
